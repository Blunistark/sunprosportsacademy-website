version: '3.8'

services:
  backend:
    build: ./Backend
    container_name: sunpro_backend
    restart: always
    environment:
      PORT: 4000
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-Bhanumurthy@Sunprosportsacademy.com}
      SMTP_PASS: ${SMTP_PASS:-1Bhanumurthy@Sunprosportsacademy}
      SMTP_FROM: ${SMTP_FROM:-Bhanumurthy@Sunprosportsacademy.com}
      CONTACT_RECEIVER_EMAIL: ${CONTACT_RECEIVER_EMAIL:-Bhanumurthy@Sunprosportsacademy.com}
    ports:
      - "4000:4000"
    networks:
      - sunpro_network

  frontend:
    build: ./Frontend
    container_name: sunpro_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
    depends_on:
      - backend
    networks:
      - sunpro_network

networks:
  sunpro_network:
    driver: bridge
